name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.1"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfL "${base_url}/${archive}" -o "${archive}"
          curl -sSfL "${base_url}/gitleaks_${version}_checksums.txt" -o checksums.txt
          grep " ${archive}$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        shell: bash
        run: gitleaks dir --config .gitleaks.toml --redact --no-banner --verbose .
